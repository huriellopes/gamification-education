name: CI - Code Integrity

on:
  push:
    branches: [ main, master ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # Dependencies (e.g. symfony/http-foundation ^8.1) require PHP >= 8.4.1.
          # Keep this in sync with the Sail container (currently PHP 8.5).
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, bcmath, intl, pdo, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate App Key
        run: php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Run Laravel Pint (Formatting)
        run: ./vendor/bin/pint --test

      - name: Run PHPStan (Static Analysis)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Run Rector (Automated Refactoring — check only)
        run: ./vendor/bin/rector process --dry-run

      - name: Run ESLint (Vue/JS Linter)
        # No --fix in CI: lint should report, not rewrite files. Errors fail the build;
        # prettier-style warnings are reported but non-blocking (run `npm run lint` locally to fix).
        run: npx eslint resources/js --ext .js,.vue --ignore-path .gitignore

      - name: Run Pest Tests
        # DB connection comes from the committed .env.testing (sqlite :memory:).
        run: ./vendor/bin/pest --ci
